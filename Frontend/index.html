<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LogiTrack — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07070d;
      --surface:  #0f0f1a;
      --border:   #1e1e30;
      --amber:    #f59e0b;
      --amber-dim:#7c4f05;
      --text:     #e2e2ee;
      --muted:    #6b6b85;
      --danger:   #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid de fondo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Glow central */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      background: var(--amber);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .brand h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .brand p {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--amber);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--amber);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.99); }

    .btn.loading { opacity: 0.6; pointer-events: none; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      color: var(--danger);
      margin-bottom: 1.2rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-wrap { animation: fadeIn 0.5s ease both; }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-icon">⬡</div>
      <h1>LogiTrack</h1>
    </div>
    <p>Sistema de gestión de inventario</p>
  </div>

  <div class="card">
    <h2>Iniciar sesión</h2>
    <p>Ingresa tus credenciales para continuar</p>

    <div class="error-msg" id="errorMsg">Usuario o contraseña incorrectos</div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="tu_usuario" autocomplete="off"/>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••"/>
    </div>

    <button class="btn" id="btnLogin" onclick="login()">Ingresar</button>
  </div>

  <p class="footer-note">LogiTrack v1.0 &mdash; CampusLand 2026</p>
</div>

<script>
  const API = 'http://localhost:8080';

  // Si ya hay token, ir al dashboard
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');

    if (!username || !password) {
      err.textContent = 'Completa todos los campos';
      err.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.textContent = 'Verificando...';
    err.classList.remove('show');

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) throw new Error();

      const data = await res.json();
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', username);
      window.location.href = 'dashboard.html';

    } catch {
      err.textContent = 'Usuario o contraseña incorrectos';
      err.classList.add('show');
      btn.classList.remove('loading');
      btn.textContent = 'Ingresar';
    }
  }
</script>
</body>
</html>
